services:
  longcat-avarta-origin-server:
    image: longcat-avarta-image:0.1
    hostname: longcat-avarta-origin-server
    container_name: longcat-avarta-origin-server
    restart: always
    network_mode: host
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 192.168.3.1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - AIGC_UID=${AIGC_UID:-1001}
      - AIGC_GID=${AIGC_GID:-1001}
      - TZ=Asia/Shanghai
    volumes:
      - /home/aigc/work/models/aivideo_models/LongCat-Video-Avatar-1.5:/app/weights/LongCat-Video-Avatar-1.5
      - /home/aigc/work/models/aivideo_models/LongCat-Video:/app/weights/LongCat-Video
    extra_hosts:
      - "host.docker.internal:host-gateway"
    #tty: true
