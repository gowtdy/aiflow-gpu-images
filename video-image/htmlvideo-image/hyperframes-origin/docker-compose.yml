services:
  hyperframes-origin-server:
    image: hyperframes-origin-image:0.1
    hostname: hyperframes-origin-server
    container_name: hyperframes-origin-server
    restart: unless-stopped
    network_mode: host
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 192.168.3.1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - AIGC_UID=${AIGC_UID:-1001}
      - AIGC_GID=${AIGC_GID:-1001}
      - TZ=Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    #tty: true
